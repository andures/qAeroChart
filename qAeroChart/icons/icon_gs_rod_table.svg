<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Table body: three rows -->
  <rect x="4" y="10" width="56" height="44" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Horizontal dividers -->
  <line x1="4" y1="21" x2="60" y2="21" stroke="#000" stroke-width="1.5"/>
  <line x1="4" y1="32" x2="60" y2="32" stroke="#000" stroke-width="1.5"/>
  <line x1="4" y1="43" x2="60" y2="43" stroke="#000" stroke-width="1.5"/>
  <!-- Vertical dividers (label col + unit col) -->
  <line x1="24" y1="21" x2="24" y2="54" stroke="#000" stroke-width="1.5"/>
  <line x1="36" y1="21" x2="36" y2="54" stroke="#000" stroke-width="1.5"/>
  <!-- Title row label -->
  <text x="32" y="19" font-size="7" fill="#000" font-family="Arial" text-anchor="middle" font-weight="bold">Rate of Descent</text>
  <!-- Header row: GS -->
  <text x="13" y="30" font-size="6" fill="#000" font-family="Arial" text-anchor="middle">GS</text>
  <text x="30" y="30" font-size="6" fill="#000" font-family="Arial" text-anchor="middle">KT</text>
  <text x="48" y="30" font-size="6" fill="#000" font-family="Arial" text-anchor="middle">▶▶</text>
  <!-- Timing row -->
  <text x="13" y="41" font-size="5" fill="#000" font-family="Arial" text-anchor="middle">NM</text>
  <text x="30" y="41" font-size="5" fill="#000" font-family="Arial" text-anchor="middle">min:s</text>
  <!-- ROD row -->
  <text x="13" y="52" font-size="5" fill="#000" font-family="Arial" text-anchor="middle">ROD</text>
  <text x="30" y="52" font-size="5" fill="#000" font-family="Arial" text-anchor="middle">ft/min</text>
</svg>
