<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Vertical axis -->
  <line x1="12" y1="2" x2="12" y2="22" stroke="#333" stroke-width="1.5"/>
  <!-- Main metre ticks (right) -->
  <line x1="12" y1="5"  x2="18" y2="5"  stroke="#333" stroke-width="1.2"/>
  <line x1="12" y1="11" x2="18" y2="11" stroke="#333" stroke-width="1.2"/>
  <line x1="12" y1="17" x2="18" y2="17" stroke="#333" stroke-width="1.2"/>
  <!-- Mid-step metre ticks (right, shorter) -->
  <line x1="12" y1="8"  x2="15" y2="8"  stroke="#333" stroke-width="0.8"/>
  <line x1="12" y1="14" x2="15" y2="14" stroke="#333" stroke-width="0.8"/>
  <!-- Main feet ticks (left) -->
  <line x1="12" y1="5"  x2="6"  y2="5"  stroke="#333" stroke-width="1.2"/>
  <line x1="12" y1="11" x2="6"  y2="11" stroke="#333" stroke-width="1.2"/>
  <line x1="12" y1="17" x2="6"  y2="17" stroke="#333" stroke-width="1.2"/>
  <!-- Mid-step feet ticks (left, shorter) -->
  <line x1="12" y1="8"  x2="9"  y2="8"  stroke="#333" stroke-width="0.8"/>
  <line x1="12" y1="14" x2="9"  y2="14" stroke="#333" stroke-width="0.8"/>
  <!-- Bottom connector -->
  <line x1="6" y1="22" x2="18" y2="22" stroke="#333" stroke-width="1.2"/>
</svg>
